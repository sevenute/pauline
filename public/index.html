<!DOCTYPE html>
<html>
    <head>
        <title>Bleu Vitrail</title>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <link rel="preconnect" href="https://fonts.bunny.net">
        <link href="https://fonts.bunny.net/css?family=chela-one:400|work-sans:300" rel="stylesheet" />
        <link rel="shortcut icon" href="images/logo.jpg" />
        <style>
            :root {
                --bronze: #090916;
                --beige: #FFFFEF;
                --bleu: #0006FF;
            }
            html, body { height: 100%; }
            body { background: var(--beige); margin: 0; padding: 0; width: 100%; display: table; font-family: 'Work Sans', sans-serif; font-weight: 300; }
            .container { text-align: center; display: table-cell; vertical-align: middle; }
            .content { text-align: center; display: inline-block; }
            .title { font-family: 'Chela One', display; font-weight: normal; font-size: 96px; color: var(--bleu) }
            .sub-title { font-size: 32px; color: #557f97; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="content">
                <img style="height: 256px; width: 256px;" src="images/logo.svg" />
                <div class="title">Bleu Vitrail</div>
                <div class="sub-title">Disponible prochainement</div>
            </div>
        </div>
    </body>
</html>
